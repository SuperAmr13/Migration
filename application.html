<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مركز التجنيد | Last War</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .form-card { background: rgba(15, 23, 42, 0.9); border: 1px solid #f97316; clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">
    <div class="max-w-2xl w-full form-card p-10 shadow-2xl">
        <h2 class="text-3xl font-black text-orange-500 mb-8 text-center">نموذج طلب الهجرة</h2>
        <form action="https://formspree.io/f/YOUR_ID" method="POST" class="space-y-5">
            <div><label class="block text-sm font-bold mb-2">اسم اللاعب</label><input name="name" type="text" required class="w-full p-3 rounded"></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-sm font-bold mb-2">رقم السيرفر</label><input name="server" type="number" required class="w-full p-3 rounded"></div>
                <div><label class="block text-sm font-bold mb-2">القوة (CP)</label><input name="cp" type="text" required class="w-full p-3 rounded"></div>
            </div>
            <div><label class="block text-sm font-bold mb-2">مستوى HQ</label><select name="hq" class="w-full p-3 rounded"><option>25</option><option>27</option><option>30+</option></select></div>
            <button type="submit" class="w-full bg-orange-600 py-4 rounded font-black text-xl hover:bg-orange-700 transition">إرسال للقيادة العسكرية</button>
        </form>
        <p class="mt-6 text-center text-gray-500"><a href="index.html">← العودة للرئيسية</a></p>
    </div>
</body>
</html>
