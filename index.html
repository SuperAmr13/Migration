<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Migration | هجرة السيرفر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020617; color: white; overflow-x: hidden; }
        .en { font-family: 'Orbitron', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                        url('https://r.jina.ai/i/6f97316/0'); /* صورة الواجهة الأولى */
            background-size: cover; background-position: center;
        }
        .mil-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(249, 115, 22, 0.3); backdrop-filter: blur(8px); clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); }
        .glow-orange { box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body>
    <nav class="flex justify-between items-center p-5 border-b border-orange-500/20 sticky top-0 bg-[#020617]/95 z-50">
        <div class="text-xl font-900 text-orange-500 uppercase tracking-tighter">Last War <span class="text-white text-[10px] block opacity-50">Migration Hub</span></div>
        <div class="flex items-center gap-4">
            <button onclick="toggleLang()" id="langBtn" class="border border-orange-500 px-3 py-1 rounded text-xs hover:bg-orange-500 transition">English</button>
            <a href="application.html" class="bg-orange-600 px-4 py-2 rounded font-bold text-sm glow-orange" id="navApply">قدم الآن</a>
        </div>
    </nav>

    <header class="hero-bg min-h-[85vh] flex items-center justify-center text-center px-6">
        <div data-aos="zoom-out">
            <h1 id="hTitle" class="text-5xl md:text-8xl font-900 mb-6 drop-shadow-lg">الهجرة الكبرى بدأت</h1>
            <p id="hDesc" class="text-lg md:text-2xl text-gray-300 max-w-3xl mx-auto mb-10">انضم إلى أقوى تحالف في السيرفر. لا تكن مجرد لاعب، كن أسطورة تقود المعركة.</p>
            <div class="flex flex-wrap gap-4 justify-center">
                <a href="application.html" id="hBtn1" class="bg-orange-600 px-8 py-4 rounded-lg text-xl font-black hover:scale-105 transition">ابدأ الطلب الآن</a>
                <a href="guide.html" id="hBtn2" class="border border-gray-500 px-8 py-4 rounded-lg text-xl font-bold hover:bg-white/10 transition">دليل الهجرة</a>
            </div>
        </div>
    </header>

    <section class="py-20 px-6 max-w-6xl mx-auto">
        <div class="grid md:grid-cols-3 gap-8">
            <div class="mil-card p-10 text-center" data-aos="fade-up">
                <h3 id="s1" class="text-orange-500 font-bold mb-2">قوة السيرفر</h3>
                <p class="text-5xl font-black">12.6M+</p>
            </div>
            <div class="mil-card p-10 text-center" data-aos="fade-up" data-aos-delay="100">
                <h3 id="s2" class="text-orange-500 font-bold mb-2">ترتيب الـ VS</h3>
                <p class="text-5xl font-black">#3</p>
            </div>
            <div class="mil-card p-10 text-center" data-aos="fade-up" data-aos-delay="200">
                <h3 id="s3" class="text-orange-500 font-bold mb-2">الصناديق اليومية</h3>
                <p class="text-5xl font-black">500+</p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        let lang = 'ar';
        const t = {
            ar: { hTitle: "الهجرة الكبرى بدأت", hDesc: "انضم إلى أقوى تحالف في السيرفر. لا تكن مجرد لاعب، كن أسطورة تقود المعركة.", hBtn1: "ابدأ الطلب الآن", hBtn2: "دليل الهجرة", navApply: "قدم الآن", langBtn: "English", s1: "قوة السيرفر", s2: "ترتيب الـ VS", s3: "الصناديق اليومية" },
            en: { hTitle: "THE GREAT MIGRATION", hDesc: "Join the strongest alliance. Don't just be a player, be a legend leading the war.", hBtn1: "APPLY NOW", hBtn2: "GUIDE", navApply: "APPLY", langBtn: "العربية", s1: "SERVER POWER", s2: "VS RANK", s3: "DAILY CHESTS" }
        };
        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            document.getElementById('mainHtml').dir = lang === 'ar' ? 'rtl' : 'ltr';
            Object.keys(t[lang]).forEach(key => { if(document.getElementById(key)) document.getElementById(key).innerText = t[lang][key]; });
        }
    </script>
</body>
</html>
