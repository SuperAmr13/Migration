<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم القائد | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .admin-table { background: #0f172a; border: 1px solid #334155; }
        th { background: #1e293b; color: #f97316; }
        tr { border-bottom: 1px solid #1e293b; transition: 0.3s; }
        tr:hover { background: #1e293b; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-orange-500 underline decoration-double">طلبات الهجرة الواردة</h1>
            <button onclick="fetchData()" class="bg-blue-600 px-4 py-2 rounded text-sm hover:bg-blue-700 transition">تحديث البيانات 🔄</button>
        </div>

        <div class="overflow-x-auto admin-table rounded-lg shadow-2xl">
            <table class="w-full text-right">
                <thead>
                    <tr class="text-lg">
                        <th class="p-4">اسم اللاعب</th>
                        <th class="p-4">السيرفر</th>
                        <th class="p-4">القوة (CP)</th>
                        <th class="p-4">HQ</th>
                        <th class="p-4">التاريخ</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ضع بياناتك من Supabase هنا
        const SUPABASE_URL = 'رابط_مشروعك_هنا';
        const SUPABASE_KEY = 'مفتاح_مشروعك_هنا';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchData() {
            const { data, error } = await supabase
                .from('applications')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error('Error:', error);
                return;
            }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(app => `
                <tr>
                    <td class="p-4 font-bold text-white">${app.name}</td>
                    <td class="p-4 text-gray-300">#${app.server_number}</td>
                    <td class="p-4 text-orange-400 font-bold">${app.cp_power}</td>
                    <td class="p-4 text-gray-300">${app.hq_level}</td>
                    <td class="p-4 text-xs text-gray-500">${new Date(app.created_at).toLocaleString('ar-EG')}</td>
                </tr>
            `).join('');
        }

        fetchData(); // تحميل البيانات عند فتح الصفحة
    </script>
</body>
</html>
