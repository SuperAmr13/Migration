<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة القيادة السرية | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; min-h-screen; }
        .login-box { background: rgba(15, 23, 42, 0.9); border: 1px solid #f97316; }
        .hidden-content { display: none; }
        .admin-table { background: #0f172a; border: 1px solid #334155; }
        th { background: #1e293b; color: #f97316; padding: 15px; }
        td { border-bottom: 1px solid #1e293b; padding: 15px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-[80vh]">
        <div class="login-box p-8 rounded-lg shadow-2xl text-center max-w-sm w-full">
            <h2 class="text-2xl font-black text-orange-500 mb-6 uppercase">دخول القائد فقط</h2>
            <input type="password" id="adminPass" placeholder="أدخل كلمة المرور" class="w-full p-3 mb-4 rounded bg-slate-800 border border-slate-600 focus:border-orange-500 outline-none text-center">
            <button onclick="checkPass()" class="w-full bg-orange-600 py-3 rounded font-bold hover:bg-orange-700 transition">دخول النظام</button>
            <p id="errorMsg" class="text-red-500 mt-4 text-sm hidden">كلمة المرور غير صحيحة!</p>
        </div>
    </div>

    <div id="adminContent" class="hidden-content max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-black text-orange-500">سجل طلبات التجنيد 🗃️</h1>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-600 px-6 py-2 rounded font-bold hover:bg-blue-700">تحديث 🔄</button>
                <button onclick="location.reload()" class="bg-red-600 px-6 py-2 rounded font-bold hover:bg-red-700">خروج</button>
            </div>
        </div>

        <div class="overflow-x-auto admin-table rounded-xl">
            <table class="w-full text-right">
                <thead>
                    <tr>
                        <th>اسم اللاعب</th>
                        <th>السيرفر</th>
                        <th>القوة (CP)</th>
                        <th>HQ</th>
                        <th>تاريخ الطلب</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- إعدادات Supabase ---
        const SUPABASE_URL = 'https://frkpedpnutsgvjdcmcfl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZya3BlZHBudXRzZ3ZqZGNtY2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjAwMjYsImV4cCI6MjA5MzgzNjAyNn0.geOFbOigd8uWGFJYoH_f6DjLmGffa19V3gIgbmhliqw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- كلمة المرور ---
        const SECRET_KEY = "102030"; // غير كلمة المرور هنا لأي شيء تريده

        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === SECRET_KEY) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden-content');
                fetchData();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        async function fetchData() {
            const { data, error } = await supabaseClient
                .from('applications')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                alert('خطأ في جلب البيانات!');
                return;
            }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(app => `
                <tr class="hover:bg-slate-800 transition">
                    <td class="font-bold">${app.name}</td>
                    <td class="text-blue-400">#${app.server_number}</td>
                    <td class="text-orange-500 font-black">${app.cp_power}</td>
                    <td><span class="bg-slate-700 px-2 py-1 rounded">LVL ${app.hq_level}</span></td>
                    <td class="text-xs text-gray-500">${new Date(app.created_at).toLocaleString('ar-EG')}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
